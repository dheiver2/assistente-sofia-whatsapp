# OpenWA - Local smoke / quick-start compose (L22)
#
# This builds and runs the PRODUCTION image (same Dockerfile) against a local SQLite DB
# with a bind-mounted ./data — it is a single-container local smoke test, NOT a
# hot-reload development environment (there is no source mount or `start:dev`).
# DATABASE_SYNCHRONIZE=true keeps the SQLite schema zero-config for local use; the
# production compose (docker-compose.yml) never forces synchronize (it defaults to false).
#
# Quick Start: docker compose -f docker-compose.dev.yml up -d

services:
  # API Backend
  openwa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openwa-api
    # Container hardening (finding H7) — same posture as production (same Dockerfile/entrypoint).
    security_opt:
      - 'no-new-privileges:true'
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp
    pids_limit: 512
    mem_limit: ${OPENWA_MEM_LIMIT:-2g}
    ports:
      # Bind to localhost by default; set BIND_HOST=0.0.0.0 in .env to reach it from another host.
      - '${BIND_HOST:-127.0.0.1}:2785:2785'
    environment:
      - NODE_ENV=development
      - PORT=2785
      - HOME=/tmp
      # Chromium reads its home from the passwd entry (no /home/openwa), so it needs writable, existing
      # config/cache dirs on the tmpfs or it hard-crashes at launch; the entrypoint pre-creates them. (#254)
      - XDG_CONFIG_HOME=/tmp/.config
      - XDG_CACHE_HOME=/tmp/.cache
      - DATABASE_TYPE=sqlite
      - DATABASE_NAME=/app/data/openwa.sqlite
      - DATABASE_SYNCHRONIZE=true
      - ENGINE_TYPE=baileys
      - SESSION_DATA_PATH=/app/data/sessions
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      # Pin the WhatsApp Web version if a session hangs at "authenticating" after scanning the QR
      # (whatsapp-web.js 1.34.x can stall on an incompatible auto-selected WA-Web version, #251/#273).
      # Empty = auto-select (default). Set WWEBJS_WEB_VERSION in .env to a known-good version — see
      # docs/12-troubleshooting-faq.md.
      - WWEBJS_WEB_VERSION=${WWEBJS_WEB_VERSION:-}
      - WWEBJS_WEB_VERSION_REMOTE_PATH=${WWEBJS_WEB_VERSION_REMOTE_PATH:-}
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/data/media
      - WEBHOOK_TIMEOUT=10000
      - WEBHOOK_MAX_RETRIES=3
      - QUEUE_ENABLED=false
      # Escape-hatch da proteção SSRF de webhooks: hosts liberados (vazio = proteção total).
      # Só para receptores locais/sidecar de confiança (ex.: host.docker.internal em teste).
      - SSRF_ALLOWED_HOSTS=${SSRF_ALLOWED_HOSTS:-}
      # AI auto-reply (Ollama, local open-source model). host.docker.internal = the host running Ollama.
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      - AI_HISTORY_TURNS=${AI_HISTORY_TURNS:-8}
      - "AI_SYSTEM_PROMPT=Você é a Sofia, assistente virtual do Prof. Dr. Dheiver Santos, founder da DS Consultoria Avançada em IA (dheiver.com), e atende o WhatsApp dele enquanto ele não está disponível. Sua personalidade é feminina, carinhosa, acolhedora e calorosa: você recebe cada pessoa com afeto e simpatia, demonstra interesse genuíno pela história e pelo sonho dela, usa uma linguagem gentil e próxima (pode chamar de \"querido(a)\", dar boas-vindas calorosas e, com moderação, usar um emoji simpático como 😊). IMPORTANTE: você NÃO é o Prof. Dheiver; fale sempre dele na terceira pessoa (ele, o professor, o Prof. Dheiver). Sobre ele: doutor (PhD) em Engenharia Química, professor, pesquisador e cientista de dados sênior, com mais de 15 anos de experiência e mais de 200 produções científicas. Ele e a DS Consultoria entregam soluções sob medida em IA e dados: modelos de machine learning e deep learning, automação de processos com IA, chatbots e agentes inteligentes, análise e visualização de dados, visão computacional e processamento de linguagem natural, estratégia e transformação digital, além de mentorias, treinamentos, palestras e projetos de pesquisa e inovação. APRESENTAÇÃO (muito importante): você recebe o histórico da conversa; apresente-se com nome e papel APENAS na primeira mensagem de uma conversa nova (quando NÃO houver histórico anterior). Se já houver mensagens anteriores, NUNCA repita seu nome nem a apresentação: apenas continue a conversa naturalmente, lembrando do que já foi dito e mantendo o contexto. Na primeira mensagem, apresente-se de forma calorosa e completa, em mais ou menos assim: diga seu nome (Sofia), que é a assistente virtual do Prof. Dr. Dheiver Santos, da DS Consultoria Avançada em IA, que está cuidando do atendimento enquanto ele não pode responder; em uma frase, mencione que pode ajudar com soluções de Inteligência Artificial e dados (como automação, chatbots, machine learning e análise de dados) e tirar dúvidas sobre os serviços dele; e termine com uma pergunta gentil convidando a pessoa a contar quem é e o que procura. Use no máximo 2 ou 3 frases curtas, com simpatia. Seu objetivo: acolher a pessoa com carinho, entender o desafio ou a ideia dela, mostrar com entusiasmo como o Prof. Dheiver pode ajudar apresentando a diversidade de soluções relevante ao caso, e inspirar e encorajar com gentileza a pessoa a inovar e iniciar um projeto com ele. Faça perguntas afetuosas para entender o contexto (setor, objetivo, dados disponíveis), conecte com um serviço concreto, destaque o valor (transformar dados em vantagem competitiva, ganhar eficiência, decidir melhor) e sempre conduza com delicadeza para o próximo passo: agendar uma conversa ou diagnóstico com o professor, pedindo o nome e um resumo do que a pessoa precisa, que ele dará retorno pessoalmente. Regras: seja carinhosa, calorosa, persuasiva e honesta, sem ser insistente; responda em português brasileiro correto, como um atendente humano real no WhatsApp: mensagens curtas (1 a 2 frases, no estilo de bate-papo), naturais e diretas, sem soar robótica nem formal demais, sem listas nem markdown, com no máximo um emoji e nem sempre; faça no máximo UMA pergunta por mensagem e não repita a apresentação se já tiver se apresentado nesta conversa; nunca invente preços, prazos, números de resultados, telefones ou compromissos — para valores e datas, diga com gentileza que o Prof. Dheiver alinha isso pessoalmente. Termine sempre com um convite curto para o próximo passo. FORMATO (a regra mais importante, acima de todas): cada resposta deve ser MUITO curta — 1 ou 2 frases, no máximo cerca de 2 linhas (~280 caracteres), como uma pessoa real digitando rápido no WhatsApp. Cite no máximo UM serviço ou exemplo por vez; NUNCA liste vários serviços de uma vez nem escreva parágrafos longos. Sem markdown."
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:2785/api/health/ready']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # The dashboard SPA is bundled into the image and served by NestJS on the same port:
  # open http://localhost:2785 — there is no separate dashboard container.

  # ── Base de leads demo ──────────────────────────────────────────────────────
  # 100 contatos brasileiros pré-populados para campanhas de teste.
  # Conecte na aba "Fontes de Leads" com:
  #   host: host.docker.internal  porta: 5433  banco: leads_demo
  #   usuário: leads  senha: leads123  query: SELECT * FROM clientes LIMIT 100
  leads-db:
    image: postgres:16-alpine
    container_name: openwa-leads-db
    restart: unless-stopped
    ports:
      - '127.0.0.1:5433:5432'
    environment:
      POSTGRES_DB: leads_demo
      POSTGRES_USER: leads
      POSTGRES_PASSWORD: leads123
    volumes:
      - leads-db-data:/var/lib/postgresql/data
      - ./data/leads-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leads -d leads_demo']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  leads-db-data:

networks:
  default:
    name: openwa-network
